version: '3.7'

services:
  aircraft-service:
    image: aircraft-service
    ports:
      - "8081:8081"
    mem_limit: 256m
    networks:
      - aeroops-network
    depends_on:
      - naming-service
      - zipkin-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-service:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin-server:9411/api/v2/spans
    
  flight-service:
    image: flight-service
    ports:
      - "8082:8082"
    mem_limit: 256m
    networks:
      - aeroops-network
    depends_on:
      - naming-service
      - zipkin-server
      - aircraft-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-service:8761/eureka/
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin-server:9411/api/v2/spans
  

  naming-service:
    image: serviceregistry
    ports:
      - "8761:8761"
    mem_limit: 256m
    networks:
      - aeroops-network
  
  zipkin-server:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    mem_limit: 256m
    networks:
      - aeroops-network
    restart: always


networks:
  aeroops-network:

